name: Conventional Commits Enforcement

on:
  pull_request_target:
    types: 
      - edited
      - opened
      - reopened
      - synchronize

jobs:
  lint-pr-title:
    runs-on: ubuntu-slim
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50
        env:
          GITHUB_TOKEN: ${{ github.token }}
